<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>Pom Pizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F04B39;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      position: relative;
      line-height: 0;
    }
    .poster {
      max-width: 100vw;
      max-height: 100vh;
    }
    .pom-hover {
      position: absolute;
      left: 43%;
      top: 15%;
      width: 18%;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;
    }
    .pom-hover:hover {
      opacity: 1;
    }
    .pom-hover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="Slice.png" class="poster" alt="copyright R. Pompetti, 2025">
    <div class="pom-hover">
      <img src="Pomeranian.jpeg" alt="Pomeranian">
    </div>
  </div>
</body>
</html>
