<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>PomPizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F04B39;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      position: relative;
      line-height: 0;
    }
    .poster {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .pom-trigger {
      pointer-events: all;
      cursor: pointer;
    }
    .pom-img {
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pom-trigger:hover .pom-img {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="Slice.webp" class="poster" alt="copyright R. Pompetti, 2025">
    <svg class="overlay" viewBox="0 0 2940 1912" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="c">
          <circle cx="1545" cy="565" r="255"/>
        </clipPath>
      </defs>
      <g class="pom-trigger">
        <image href="Pomeranian.jpeg"
               x="1290" y="310" width="510" height="510"
               clip-path="url(#c)"
               class="pom-img"/>
        <circle cx="1545" cy="565" r="255" fill="transparent"/>
      </g>
    </svg>
  </div>
  <script>
    // Size the SVG overlay to match the image exactly, regardless of viewport
    function fitOverlay() {
      const img = document.querySelector('.poster');
      const svg = document.querySelector('.overlay');
      svg.style.width  = img.offsetWidth  + 'px';
      svg.style.height = img.offsetHeight + 'px';
    }
    const img = document.querySelector('.poster');
    img.addEventListener('load', fitOverlay);
    window.addEventListener('resize', fitOverlay);
    if (img.complete) fitOverlay();
  </script>
</body>
</html>
