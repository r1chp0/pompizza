<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>PomPizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F04B39;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .poster {
      max-width: 100vw;
      max-height: 100vh;
    }
    .pom-hover {
      position: fixed;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;
    }
    .pom-hover.visible,
    .pom-hover.tapped {
      opacity: 1;
    }
    .pom-hover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <img src="Slice.webp" class="poster" alt="copyright R. Pompetti, 2025">
  <div id="debug" style="position:fixed;border:3px solid lime;border-radius:50%;pointer-events:none;z-index:9999;"></div>
  <div class="pom-hover">
    <img src="Pomeranian.jpeg" alt="Pomeranian">
  </div>
  <script>
    // Blue circle in original 1634x1383 image: starts at x=541, y=0, size=355x344
    const IMG_W = 1634, IMG_H = 1383;
    const CX = 541 + 355 / 2;   // 718.5
    const CY = 344 / 2;          // 172
    const R  = 355 / 2;          // 177.5

    const poster = document.querySelector('.poster');
    const hover  = document.querySelector('.pom-hover');
    const debug  = document.querySelector('#debug');

    function position() {
      const rect  = poster.getBoundingClientRect();
      const scale = rect.width / IMG_W;
      const r  = R  * scale;
      const cx = rect.left + CX * scale;
      const cy = rect.top  + CY * scale;
      hover.style.left   = (cx - r) + 'px';
      hover.style.top    = (cy - r) + 'px';
      hover.style.width  = (r * 2)  + 'px';
      hover.style.height = (r * 2)  + 'px';

      // DEBUG: show ring so we can verify placement — remove once aligned
      debug.style.left   = (cx - r) + 'px';
      debug.style.top    = (cy - r) + 'px';
      debug.style.width  = (r * 2)  + 'px';
      debug.style.height = (r * 2)  + 'px';
    }

    poster.addEventListener('load', position);
    window.addEventListener('resize', position);
    if (poster.complete) position();

    // Mouse hover
    hover.addEventListener('mouseenter', () => hover.classList.add('visible'));
    hover.addEventListener('mouseleave', () => hover.classList.remove('visible'));

    // Touch: show for 5 seconds
    let tapTimer;
    hover.addEventListener('touchstart', function(e) {
      e.preventDefault();
      clearTimeout(tapTimer);
      hover.classList.add('tapped');
      tapTimer = setTimeout(() => hover.classList.remove('tapped'), 5000);
    }, { passive: false });
  </script>
</body>
</html>
