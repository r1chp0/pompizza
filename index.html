<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>Pom Pizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F04B39;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame {
      position: relative;
      line-height: 0;
      /* Size frame to exactly the displayed image in both portrait and landscape viewports */
      width: 100vw;
      max-width: min(100vw, calc(100vh * 2940 / 1912));
    }
    .poster {
      display: block;
      width: 100%;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .pom-trigger {
      pointer-events: all;
      cursor: pointer;
    }
    .pom-img {
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pom-trigger:hover .pom-img {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="Slice.webp" class="poster" alt="copyright R. Pompetti, 2025">
    <svg class="overlay" viewBox="0 0 2940 1912" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="c">
          <circle cx="1555" cy="555" r="300"/>
        </clipPath>
      </defs>
      <g class="pom-trigger">
        <image href="Pomeranian.jpeg"
               x="1255" y="255" width="600" height="600"
               clip-path="url(#c)"
               class="pom-img"/>
        <!-- transparent circle is the hover target -->
        <circle cx="1555" cy="555" r="300" fill="transparent"/>
      </g>
    </svg>
  </div>
</body>
</html>
