<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>PomPizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 500vh;
    }
    body {
      background: #F04B39;
      height: 100vh;
      position: fixed;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10vh 10vw;
    }
    .frame {
      position: relative;
      width: fit-content;
      max-width: 80vw;
      line-height: 0;
    }
    .poster {
      display: block;
      max-width: 100%;
      max-height: 80vh;
    }
    .pom-hover {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;
      will-change: opacity;
    }
    .pom-hover.visible,
    .pom-hover.tapped {
      opacity: 1;
    }
    .pom-hover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="slice.svg" class="poster" alt="copyright R. Pompetti, 2025">
    <div class="pom-hover">
      <img src="pomeranian.jpg" alt="Pomeranian">
    </div>
  </div>
  <script>
    // Blue circle in 1634x1383 image: x=541, y=0, w=344, h=344
    const IMG_W = 1634;
    const CX = 540.5 + 355 / 2;  // 718 — center of blue circle
    const CY = 344 - 172;    // 172 — true center (circle cropped at top)
    const R  = 172;             // perfect radius

    const frame  = document.querySelector('.frame');
    const poster = document.querySelector('.poster');
    const hover  = document.querySelector('.pom-hover');

    function position() {
      const iRect = poster.getBoundingClientRect();
      const fRect = frame.getBoundingClientRect();
      const scale = iRect.width / IMG_W;
      const r  = R  * scale;
      const cx = (iRect.left - fRect.left) + CX * scale;
      const cy = (iRect.top  - fRect.top)  + CY * scale;
      hover.style.left   = (cx - r) + 'px';
      hover.style.top    = (cy - r) + 'px';
      hover.style.width  = (r * 2)  + 'px';
      hover.style.height = (r * 2)  + 'px';
    }

    poster.addEventListener('load', position);
    window.addEventListener('resize', position);
    if (poster.complete) position();

    // Scroll-linked color cycling
    // Both effects start from the original values at t=0 so there's no jump
    // #F04B39 ≈ hsl(6, 86%, 58%)
    window.addEventListener('scroll', () => {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const t = Math.max(0, Math.min(window.scrollY / maxScroll, 1));
      const bgHue   = 6   + t * 360;              // starts at original red hue
      const bgSat   = 86  - t * 11;               // 86% → 75%
      const bgLight = 58  - t * 8;                // 58% → 50%
      const imgHue  = t * 360 * 2;                // two full cycles
      const imgSat  = 1   + t * 0.5;              // 1.0 → 1.5
      document.body.style.backgroundColor = `hsl(${bgHue}, ${bgSat}%, ${bgLight}%)`;
      poster.style.filter = `hue-rotate(${imgHue}deg) saturate(${imgSat})`;
    });

    // Mouse hover
    hover.addEventListener('mouseenter', () => hover.classList.add('visible'));
    hover.addEventListener('mouseleave', () => hover.classList.remove('visible'));

    // Touch: show for 5 seconds
    let tapTimer;
    hover.addEventListener('touchstart', function(e) {
      e.preventDefault();
      clearTimeout(tapTimer);
      hover.classList.add('tapped');
      tapTimer = setTimeout(() => hover.classList.remove('tapped'), 5000);
    }, { passive: false });
  </script>
</body>
</html>
